server:
  port: 8080

spring:
  application:
    name: nutritracker-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/nutritracker}
    username: ${SPRING_DATASOURCE_USERNAME:nutritracker}
    password: ${SPRING_DATASOURCE_PASSWORD:nutritracker_pass_2024}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

nutritracker:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-here-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
