events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name localhost;

    location = / {
      set $target_frontend http://frontend:80;
      proxy_pass $target_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      set $target_frontend http://frontend:80;
      proxy_pass $target_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/swagger-ui.html {
      set $target_backend http://backend:18080;
      proxy_pass $target_backend/swagger-ui.html;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/swagger-ui/ {
      rewrite ^/api/swagger-ui/(.*)$ /swagger-ui/$1 break;
      set $target_backend http://backend:18080;
      proxy_pass $target_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v3/api-docs {
      rewrite ^/api/(.*)$ /$1 break;
      set $target_backend http://backend:18080;
      proxy_pass $target_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      set $target_backend http://backend:18080;
      proxy_pass $target_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /api;
    }

    location = /api {
      return 301 /api/;
    }
  }
}
