events {}

http {
  upstream nutritracker_backend {
    server backend:18080;
  }

  upstream nutritracker_frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name localhost;

    location = / {
      proxy_pass http://nutritracker_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://nutritracker_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/swagger-ui.html {
      proxy_pass http://nutritracker_backend/swagger-ui.html;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/swagger-ui/ {
      rewrite ^/api/swagger-ui/(.*)$ /swagger-ui/$1 break;
      proxy_pass http://nutritracker_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v3/api-docs {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://nutritracker_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://nutritracker_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /api;
    }

    location = /api {
      return 301 /api/;
    }
  }
}
